    <script>
        // ✅ CORRECT BACKEND URL (updated April 17, 2026)
        const API_BASE_URL = "https://replypilot-backend.up.railway.app";

        document.getElementById('loginBtn').addEventListener('click', login);

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage("Please enter your email and password", "error");
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('loginBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && (data.success || data.token)) {
                    showMessage("✅ Login successful! Redirecting...", "success");
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user || { email }));

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1400);
                } else {
                    showMessage(data.error || "Invalid email or password", "error");
                }
            } catch (err) {
                console.error(err);
                showMessage("❌ Cannot connect to backend. Please make sure the backend is running.", "error");
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('loginBtn').disabled = false;
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        window.addEventListener('load', () => {
            if (localStorage.getItem('token')) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
