<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ReplyPilot</title>
    <style>
        :root {
            --primary: #6366F1;
            --dark: #0F172A;
            --gray: #64748B;
            --border: #E2E8F0;
            --bg: #F8FAFC;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--dark);
            line-height: 1.6;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 60px;
            text-decoration: none;
        }

        .nav-link {
            display: block;
            padding: 14px 20px;
            margin: 6px 0;
            border-radius: 12px;
            color: var(--gray);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #F1F5F9;
            color: var(--primary);
        }

        /* Main Content */
        .main {
            margin-left: 280px;
            flex: 1;
            padding: 48px 60px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
        }

        .status {
            background: #F0FDF4;
            color: #166534;
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
        }

        .stat-card h3 {
            font-size: 15px;
            color: var(--gray);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-card .value {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* Recent Activity */
        .activity-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        .activity-card h2 {
            font-size: 22px;
            margin-bottom: 24px;
        }

        .activity-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="#" class="logo">
                🚀 ReplyPilot
            </a>
            
            <a href="#" class="nav-link active">📊 Dashboard</a>
            <a href="#" class="nav-link">⭐ Reviews</a>
            <a href="#" class="nav-link">✍️ Responses</a>
            <a href="#" class="nav-link">⚙️ Settings</a>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="header">
                <h1>Welcome to ReplyPilot</h1>
                <div class="status">✅ Backend: healthy</div>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Reviews This Month</h3>
                    <div class="value" id="reviews">18</div>
                </div>
                <div class="stat-card">
                    <h3>Response Rate</h3>
                    <div class="value" id="response">94%</div>
                </div>
                <div class="stat-card">
                    <h3>Average Rating</h3>
                    <div class="value" id="rating">4.8</div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="activity-card">
                <h2>Recent Activity</h2>
                <div id="activity-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Temporary values (we'll make these real later)
        document.getElementById('reviews').textContent = "24";
        document.getElementById('response').textContent = "96%";
        document.getElementById('rating').textContent = "4.9";

        const activities = [
            "Connected to Google Business Profile",
            "Responded to review from Sarah Johnson",
            "5 new reviews received today"
        ];

        document.getElementById('activity-list').innerHTML = activities.map(act => `
            <div class="activity-item">
                <span>${act}</span>
            </div>
        `).join('');
    </script>
</body>
</html>
