  <style>
    :root { --ink:#0A0A0F; --cream:#FAF8F4; --gold:#E8922A; --text-muted:#6B6878; }

    .actions { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
    .btn-primary { background:var(--ink); color:white; padding:14px 32px; border-radius:6px; font-size:15px; font-weight:600; text-decoration:none; transition:all 0.2s; }
    .btn-primary:hover { background:var(--gold); color:var(--ink); }
    .btn-ghost { color:var(--ink); font-size:14px; font-weight:500; text-decoration:none; display:flex; align-items:center; gap:6px; transition:color 0.2s; }
    .btn-ghost:hover { color:var(--gold); }
