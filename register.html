<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ReplyPilot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --dark: #1F2937;
            --gray: #6B7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 440px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 40px;
            justify-content: center;
            text-decoration: none;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 8px;
            color: var(--dark);
        }
        
        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        .message {
            padding: 14px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
            text-align: center;
        }
        
        .success { background: #D1FAE5; color: #065F46; }
        .error { background: #FEE2E2; color: #991B1B; }
        
        .loading {
            display: none;
            text-align: center;
            margin: 15px 0;
        }
        
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <a href="index.html" class="logo">
                <span style="font-size:32px">🚀</span>
                <span>ReplyPilot</span>
            </a>
            
            <h1>Create Your Account</h1>
            <p class="subtitle">Start automating your review responses today</p>

            <div id="message" class="message"></div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Smith" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <button class="btn" id="registerBtn">Create Account</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Creating your account...</p>
            </div>

            <p style="text-align:center; margin-top:24px; font-size:14px; color:var(--gray);">
                Already have an account? <a href="login.html" style="color:var(--primary); font-weight:600;">Log in here</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://replypilot-backend-production.up.railway.app";   // ← CHANGE THIS TO YOUR CURRENT RAILWAY URL

        document.getElementById('registerBtn').addEventListener('click', register);

        async function register() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Basic validation
            if (!name || !email || !password || !confirmPassword) {
                showMessage("Please fill in all fields", "error");
                return;
            }
            if (password !== confirmPassword) {
                showMessage("Passwords do not match", "error");
                return;
            }
            if (password.length < 6) {
                showMessage("Password must be at least 6 characters", "error");
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('registerBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage("✅ Account created successfully! Redirecting...", "success");
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage("❌ " + (data.error || data.message || "Registration failed"), "error");
                }
            } catch (err) {
                showMessage("❌ Network error. Please check your connection.", "error");
                console.error(err);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('registerBtn').disabled = false;
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }

        // Allow pressing Enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
