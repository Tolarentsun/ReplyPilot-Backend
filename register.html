  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ReplyPilot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --dark: #1E2937;
            --gray: #64748B;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
       
        .card {
            background: white;
            border-radius: 28px;
            padding: 52px 48px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.18);
            max-width: 480px;
            width: 100%;
        }
       
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 32px;
            text-decoration: none;
        }
       
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--dark);
        }
       
        .subtitle {
            text-align: center;
            color: var(--gray);
            font-size: 15.5px;
            margin-bottom: 36px;
            line-height: 1.5;
        }
       
        .form-group {
            margin-bottom: 22px;
        }
       
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }
       
        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            background: #F8FAFC;
        }
       
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
        }
       
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--primary), #7C3AED);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }
       
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(99,102,241,0.35);
        }
       
        .message {
            padding: 16px 20px;
            border-radius: 14px;
            margin: 20px 0;
            display: none;
            font-size: 15px;
            text-align: center;
            font-weight: 500;
        }
       
        .success { background: #DCFCE7; color: #166534; }
        .error { background: #FEE2E2; color: #991B1B; }
       
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: var(--gray);
        }
       
        .spinner {
            width: 26px;
            height: 26px;
            border: 3px solid #E2E8F0;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
       
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="logo">
            <span>🚀</span>
            <span>ReplyPilot</span>
        </a>
       
        <h1>Create Account</h1>
        <p class="subtitle">Join ReplyPilot and start generating smart replies</p>
        
        <div id="message" class="message"></div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
       
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a strong password" required>
        </div>
        
        <button class="btn" id="registerBtn">Create Account</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Creating your account...</p>
        </div>
        
        <p style="text-align:center; margin-top:32px; font-size:14px; color:var(--gray);">
            Already have an account? <a href="login.html" style="color:var(--primary); font-weight:600;">Sign in here</a>
        </p>
    </div>

    <script>
        const API_BASE_URL = "";

        document.addEventListener('DOMContentLoaded', () => {
            const registerBtn = document.getElementById('registerBtn');
            registerBtn.addEventListener('click', register);

            // Enter key support
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') register();
            });
        });

        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            const registerBtn = document.getElementById('registerBtn');

            if (!email || !password) {
                showMessage("Please enter your email and password", "error");
                return;
            }

            if (password.length < 6) {
                showMessage("Password must be at least 6 characters long", "error");
                return;
            }

            loadingDiv.style.display = 'block';
            registerBtn.disabled = true;
            messageDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && (data.success || data.token)) {
                    showMessage("✅ Account created successfully! Redirecting...", "success");
                    
                    // Auto login after successful registration
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user || { email }));
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.error || "Registration failed. Try a different email.", "error");
                }
            } catch (err) {
                console.error(err);
                showMessage("❌ Cannot connect to server. Please check if backend is running.", "error");
            } finally {
                loadingDiv.style.display = 'none';
                registerBtn.disabled = false;
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
