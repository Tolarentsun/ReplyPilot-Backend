        <script>
        // ✅ CORRECT BACKEND URL (updated April 17, 2026)
        const API_BASE_URL = "https://replypilot-backend.up.railway.app";

        document.getElementById('registerBtn').addEventListener('click', register);

        async function register() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !email || !password || !confirmPassword) {
                showMessage("Please fill in all fields", "error");
                return;
            }
            if (password !== confirmPassword) {
                showMessage("Passwords do not match", "error");
                return;
            }
            if (password.length < 6) {
                showMessage("Password must be at least 6 characters", "error");
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('registerBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok && (data.success || data.token)) {
                    showMessage("✅ Account created successfully! Redirecting...", "success");
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user || { name, email }));

                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    showMessage(data.error || "Registration failed", "error");
                }
            } catch (err) {
                console.error(err);
                showMessage("❌ Cannot connect to backend. Please make sure the backend is running and the URL is correct.", "error");
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('registerBtn').disabled = false;
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
