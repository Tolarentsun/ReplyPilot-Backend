<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ReplyPilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#0A0A0F; --cream:#FAF8F4; --gold:#D4A853; --mist:#E8E4DC; --text:#2A2A35; --text-muted:#6B6878; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; min-height:100vh; display:grid; grid-template-columns:1fr 1fr; background:var(--ink); }
    .auth-left { background:linear-gradient(135deg,#0A0A0F 0%,#1A1A2E 100%); padding:60px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
    .auth-left::before { content:''; position:absolute; top:-20%; left:-20%; width:60%; height:60%; background:radial-gradient(circle,rgba(212,168,83,0.12) 0%,transparent 60%); }
    .logo { font-family:'Playfair Display',serif; font-size:24px; font-weight:800; color:white; text-decoration:none; position:relative; z-index:1; }
    .logo span { color:var(--gold); }
    .left-body { position:relative; z-index:1; }
    .left-title { font-family:'Playfair Display',serif; font-size:32px; font-weight:800; color:white; line-height:1.3; margin-bottom:16px; }
    .left-sub { font-size:15px; color:rgba(255,255,255,0.5); line-height:1.7; }
    .auth-right { background:var(--cream); padding:60px 80px; display:flex; align-items:center; justify-content:center; }
    .auth-form { width:100%; max-width:380px; }
    .form-heading { font-family:'Playfair Display',serif; font-size:34px; font-weight:800; color:var(--ink); margin-bottom:8px; }
    .form-sub { font-size:15px; color:var(--text-muted); margin-bottom:40px; }
    .form-group { margin-bottom:24px; }
    label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:8px; }
    input { width:100%; padding:14px 16px; border:1.5px solid var(--mist); border-radius:8px; font-size:15px; font-family:'DM Sans',sans-serif; background:white; color:var(--text); transition:all 0.2s; }
    input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,168,83,0.15); }
    .btn-submit { width:100%; padding:16px; background:var(--ink); color:white; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.25s; margin-top:8px; }
    .btn-submit:hover:not(:disabled) { background:var(--gold); color:var(--ink); transform:translateY(-1px); }
    .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
    .form-message { margin-top:16px; padding:14px 16px; border-radius:8px; font-size:14px; display:none; }
    .form-message.error { background:#FEE2E2; color:#991B1B; border:1px solid #FCA5A5; display:block; }
    .form-message.success { background:#D1FAE5; color:#065F46; border:1px solid #A7F3D0; display:block; }
    .form-footer { text-align:center; margin-top:32px; font-size:14px; color:var(--text-muted); }
    .form-footer a { color:var(--ink); font-weight:600; text-decoration:none; }
    .form-footer a:hover { color:var(--gold); }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:768px) { body { grid-template-columns:1fr; } .auth-left { display:none; } .auth-right { padding:40px 24px; } }
  </style>
</head>
<body>
  <div class="auth-left">
    <a href="index.html" class="logo">Reply<span>Pilot</span></a>
    <div class="left-body">
      <div class="left-title">Choose a strong password.</div>
      <div class="left-sub">Use at least 6 characters. A mix of letters, numbers, and symbols makes it harder to guess.</div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.25)">Reset links expire after 1 hour.</div>
  </div>
  <div class="auth-right">
    <div class="auth-form" id="form-wrap">
      <h1 class="form-heading">Set new password</h1>
      <p class="form-sub">Enter your new password below.</p>

      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm">Confirm New Password</label>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
      </div>

      <button class="btn-submit" id="submit-btn" onclick="resetPassword()">Set New Password</button>
      <div class="form-message" id="message"></div>

      <div class="form-footer">
        <a href="login.html">Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('form-wrap').innerHTML = '<p style="color:#991B1B;font-size:15px">Invalid or missing reset token. <a href="forgot-password.html" style="color:var(--ink);font-weight:600">Request a new link →</a></p>';
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');

      if (!password || !confirm) { showMsg('Please fill in both fields.', 'error'); return; }
      if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
      if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Saving...';

      try {
        const { data, ok } = await API.post('/api/auth/reset-password', { token, password });
        if (ok && data.success) {
          showMsg('✓ Password updated! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          showMsg(data?.error || 'Reset failed. The link may have expired.', 'error');
          btn.disabled = false;
          btn.textContent = 'Set New Password';
        }
      } catch (e) {
        showMsg('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `form-message ${type}`;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
  </script>
</body>
</html>
