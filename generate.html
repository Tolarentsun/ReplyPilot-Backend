<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Replies - ReplyPilot</title>
    <style>
        :root {
            --primary: #6366F1;
            --dark: #0F172A;
            --gray: #64748B;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #F8FAFC;
            color: var(--dark);
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--gray);
            margin-bottom: 32px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 32px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 16px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
        }

        .options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .tone-btn {
            padding: 10px 20px;
            border: 1px solid #E2E8F0;
            background: white;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 15px;
        }

        .tone-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .replies {
            margin-top: 40px;
        }

        .reply-card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .reply-label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .copy-btn {
            margin-top: 12px;
            background: #F1F5F9;
            color: var(--dark);
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generate Smart Replies</h1>
        <p class="subtitle">Paste a customer review and get professional AI responses</p>

        <div class="card">
            <label for="review">Customer Review</label>
            <textarea id="review" placeholder="Paste the customer's review here..."></textarea>

            <label style="margin-top: 24px; display: block;">Tone</label>
            <div class="options" id="tone-options">
                <!-- Tones will be added by JS -->
            </div>

            <button onclick="generateReplies()">Generate Replies</button>
        </div>

        <div class="replies" id="replies-container"></div>
    </div>

    <script>
        const API_BASE_URL = "https://replypilot-backend-production.up.railway.app";
        let selectedTone = "Professional";

        const tones = ["Professional", "Friendly", "Empathetic", "Short & Direct", "Enthusiastic"];

        // Create tone buttons
        const toneContainer = document.getElementById('tone-options');
        tones.forEach(tone => {
            const btn = document.createElement('button');
            btn.className = `tone-btn ${tone === selectedTone ? 'active' : ''}`;
            btn.textContent = tone;
            btn.onclick = () => {
                document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTone = tone;
            };
            toneContainer.appendChild(btn);
        });

        async function generateReplies() {
            const reviewText = document.getElementById('review').value.trim();
            const repliesContainer = document.getElementById('replies-container');

            if (!reviewText) {
                alert("Please paste a customer review");
                return;
            }

            repliesContainer.innerHTML = "<p>Generating replies...</p>";

            try {
                const response = await fetch(`${API_BASE_URL}/api/generate-replies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: reviewText,
                        tone: selectedTone,
                        count: 4
                    })
                });

                const data = await response.json();

                if (data.success) {
                    let html = `<h2 style="margin-bottom: 20px;">Suggested Replies</h2>`;
                    
                    data.replies.forEach((reply, index) => {
                        html += `
                            <div class="reply-card">
                                <div class="reply-label">${reply.label || `Reply ${index + 1}`}</div>
                                <p>${reply.reply}</p>
                                <button class="copy-btn" onclick="copyToClipboard('${reply.reply.replace(/'/g, "\\'")}')">Copy Reply</button>
                            </div>
                        `;
                    });

                    repliesContainer.innerHTML = html;
                } else {
                    repliesContainer.innerHTML = `<p style="color:red;">Error: ${data.error || "Failed to generate replies"}</p>`;
                }
            } catch (err) {
                console.error(err);
                repliesContainer.innerHTML = `<p style="color:red;">Cannot connect to server. Make sure backend is running.</p>`;
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Reply copied to clipboard!");
            });
        }
    </script>
</body>
</html>
