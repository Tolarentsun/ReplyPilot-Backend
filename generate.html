<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Replies · ReplyPilot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-600: #4338CA;
            --ink: #0F172A;
            --muted: #64748B;
            --border: #E2E8F0;
            --bg: #F8FAFC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--ink);
            padding: 40px 20px 60px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .brand {
            font-weight: 700;
            color: var(--primary);
            font-size: 18px;
            text-decoration: none;
        }
        .back {
            padding: 8px 14px;
            font-size: 13.5px;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            text-decoration: none;
            background: white;
        }
        .back:hover { color: var(--primary); border-color: var(--primary); }

        h1 { font-size: 30px; margin-bottom: 6px; letter-spacing: -0.02em; }
        .subtitle { color: var(--muted); margin-bottom: 28px; }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.04);
            margin-bottom: 24px;
        }

        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }

        textarea {
            width: 100%;
            height: 160px;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            resize: vertical;
            font-family: inherit;
            background: var(--bg);
            transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79,70,229,.12);
        }

        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 24px; }
        .chip {
            padding: 9px 16px;
            border: 1.5px solid var(--border);
            background: white;
            border-radius: 999px;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 500;
            transition: all .15s ease;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(79,70,229,.25);
        }

        .btn {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .08s ease, box-shadow .15s ease;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(79,70,229,.35); }
        .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

        .replies { margin-top: 32px; }
        .reply-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
        }
        .reply-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }
        .reply-text { font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
        .copy-btn {
            margin-top: 14px;
            background: #F1F5F9;
            color: var(--ink);
            padding: 9px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13.5px;
            font-weight: 500;
        }
        .copy-btn:hover { background: #E2E8F0; }

        .error { color: #991B1B; background: #FEF2F2; padding: 14px; border-radius: 10px; }

        .skeleton {
            background: linear-gradient(90deg, #F1F5F9, #E2E8F0, #F1F5F9);
            background-size: 200% 100%;
            animation: shimmer 1.2s linear infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <a href="index.html" class="brand">🚀 ReplyPilot</a>
            <a href="dashboard.html" class="back">Go to dashboard →</a>
        </div>

        <h1>Generate Smart Replies</h1>
        <p class="subtitle">Paste a customer review and get professional AI responses in seconds.</p>

        <div class="card">
            <label for="review">Customer Review</label>
            <textarea id="review" placeholder="Paste the customer's review here…"></textarea>

            <label style="margin-top: 20px;">Tone</label>
            <div class="chips" id="toneChips"></div>

            <button class="btn" id="genBtn">✨ Generate Replies</button>
        </div>

        <div class="replies" id="replies"></div>
    </div>

    <script>
        const API_BASE_URL = "";
        const TONES = ["Professional", "Friendly", "Empathetic", "Short & Direct", "Enthusiastic"];
        let selectedTone = "Professional";

        const $ = (id) => document.getElementById(id);
        const token = localStorage.getItem("token");

        function renderChips() {
            const host = $("toneChips");
            host.innerHTML = "";
            TONES.forEach((tone) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = `chip ${tone === selectedTone ? "active" : ""}`;
                btn.textContent = tone;
                btn.onclick = () => {
                    selectedTone = tone;
                    renderChips();
                };
                host.appendChild(btn);
            });
        }

        function escapeHtml(str) {
            return String(str || "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
            })[c]);
        }

        async function generate() {
            const text = $("review").value.trim();
            const host = $("replies");

            if (!text) {
                host.innerHTML = `<div class="error">Please paste a customer review.</div>`;
                return;
            }

            const btn = $("genBtn");
            btn.disabled = true;
            btn.textContent = "⏳ Generating…";
            host.innerHTML = [0,1,2,3].map(() => `
                <div class="reply-card">
                    <div class="skeleton" style="height:12px; width:45%; margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:10px; width:95%; margin-bottom:6px;"></div>
                    <div class="skeleton" style="height:10px; width:85%;"></div>
                </div>
            `).join("");

            try {
                const headers = { "Content-Type": "application/json" };
                if (token) headers.Authorization = `Bearer ${token}`;
                const response = await fetch(`${API_BASE_URL}/api/generate-replies`, {
                    method: "POST",
                    headers,
                    body: JSON.stringify({ text, tone: selectedTone, count: 4, save: !!token }),
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.error || "Failed to generate replies");

                host.innerHTML = `<h2 style="margin-bottom:16px; font-size:20px;">Suggested Replies</h2>` +
                    data.replies.map((reply, i) => `
                        <div class="reply-card">
                            <div class="reply-label">${escapeHtml(reply.label || `Reply ${i + 1}`)}</div>
                            <div class="reply-text">${escapeHtml(reply.reply)}</div>
                            <button class="copy-btn" data-idx="${i}">📋 Copy Reply</button>
                        </div>
                    `).join("");

                host.querySelectorAll(".copy-btn").forEach((b) => {
                    b.onclick = async () => {
                        const idx = +b.dataset.idx;
                        await navigator.clipboard.writeText(data.replies[idx].reply);
                        b.textContent = "✓ Copied";
                        setTimeout(() => (b.textContent = "📋 Copy Reply"), 1400);
                    };
                });
            } catch (err) {
                host.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "✨ Generate Replies";
            }
        }

        renderChips();
        $("genBtn").addEventListener("click", generate);
    </script>
</body>
</html>
